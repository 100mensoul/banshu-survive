<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヒメログ｜平尾の取材ノート｜播州サバイブ</title>
  <meta name="description" content="路上雑誌社の記者・平尾の取材ノート。エピソードになる前の、いまの思考とそのタネ。" />
  <link rel="stylesheet" href="himelog.css?v=himelog12" />
</head>
<body>

  <header class="himelog-header">
    <p class="himelog-kicker">路上雑誌社・平尾　取材ノート</p>
    <h1 class="himelog-title">ヒメログ</h1>
    <p class="himelog-lead">
      エピソードになる前の、いまの思考と、そのタネ。<br />
      整いきっていない言葉のまま、ここに置いていく。
    </p>
    <nav class="himelog-nav">
      <a href="../index.html">← 播州サバイブ トップ</a>
    </nav>
  </header>

  <main class="himelog-main">
    <div class="himelog-search" id="tag-search-wrap">
      <label class="himelog-search-label" for="tag-search-input">タグで検索</label>
      <div class="himelog-search-row">
        <input
          type="search"
          id="tag-search-input"
          class="himelog-search-input"
          placeholder="例：姫路、農業、ツインコモンズ"
          autocomplete="off"
        >
        <button type="button" id="tag-search-clear" class="himelog-search-clear" hidden>クリア</button>
      </div>
      <p class="himelog-search-hint" id="tag-search-hint" hidden></p>
    </div>

    <div class="himelog-filterbar" id="tag-filterbar" hidden>
      <span class="himelog-filterbar-label">タグで絞り込み：</span>
      <span id="tag-filters"></span>
      <button type="button" id="tag-clear" class="himelog-tag himelog-tag--clear" hidden>すべて表示</button>
    </div>

    <div id="himelog-list" class="himelog-list">
      <p class="himelog-loading">読み込み中…</p>
    </div>
  </main>

  <footer class="himelog-footer">
    <p>播州サバイブ 〜姫の路〜</p>
  </footer>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module" src="himelog.js?v=himelog12"></script>
</body>
</html>
