<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丹波道・水路マップ｜播州サバイブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600&family=Zen+Kaku+Gothic+New:wght@500;600&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="../css/suiro-map.css">
</head>
<body class="suiro-page">
  <header class="suiro-header">
    <div class="suiro-header__inner">
      <div class="suiro-header__titles">
        <span class="suiro-header__en">SUIRŌ / TANBA-MICHI</span>
        <h1 class="suiro-header__ja">丹波道と水路</h1>
        <p class="suiro-header__meta">中心：丹波道の地蔵坐像付道標</p>
      </div>
      <a class="suiro-header__back" href="../index.html">← トップ</a>
    </div>
  </header>

  <div class="suiro-stage">
    <div id="map" role="application" aria-label="水路・古道の地図"></div>

    <div class="suiro-float suiro-status" aria-live="polite">
      <div class="suiro-status__card">
        <span class="suiro-status__pulse" id="status-pulse" data-level="warn" aria-hidden="true"></span>
        <div class="suiro-status__text">
          <span class="suiro-status__label">このあたりの水の見立て</span>
          <span class="suiro-status__value" id="status-value">やや増水</span>
        </div>
        <span class="suiro-status__sub" id="status-meta">仮データ · 観測連携前</span>
      </div>
    </div>

    <div class="suiro-float suiro-legend" aria-label="凡例">
      <div class="suiro-legend__card">
        <div class="suiro-legend__row"><span class="suiro-legend__swatch suiro-legend__swatch--water"></span>水路（現地確認中）</div>
        <div class="suiro-legend__row"><span class="suiro-legend__swatch suiro-legend__swatch--road"></span>古街道のイメージ</div>
        <div style="margin-top:0.35rem;">地点をタップして詳細</div>
      </div>
    </div>

    <aside class="suiro-detail" id="detail" aria-hidden="true">
      <div class="suiro-detail__panel">
        <header class="suiro-detail__head">
          <button type="button" class="suiro-detail__close" id="detail-close" aria-label="閉じる">×</button>
          <h2 class="suiro-detail__name" id="detail-name"></h2>
          <span class="suiro-detail__level" id="detail-level"></span>
        </header>
        <div class="suiro-detail__photo" id="detail-photo-wrap">
          <span id="detail-photo-placeholder">現地写真を登録予定</span>
          <img id="detail-photo" alt="" class="is-hidden" decoding="async">
        </div>
        <div class="suiro-detail__body">
          <p id="detail-note"></p>
          <p class="suiro-detail__rain" id="detail-rain"></p>
          <a class="suiro-detail__link" id="detail-map-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Googleマップで開く</a>
        </div>
      </div>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const center = [34.83973, 134.73632];
    const JIZO_MAP_URL = "https://maps.app.goo.gl/QH4JRswqTLR2hGuMA";

    const levelKey = {
      "平常": "safe",
      "やや増水": "warn",
      "注意": "danger"
    };

    const points = [
      {
        id: "jizo-guidepost",
        name: "丹波道の地蔵坐像付道標",
        coords: center,
        level: "やや増水",
        rain: "雨量メモ：9 mm/h（仮）",
        note: "丹波道・但馬道・有馬道などが城山の南で交差したとされる地点。道標と地蔵を起点に、水路と用水の記録を重ねていく。",
        photo: null,
        mapUrl: JIZO_MAP_URL,
        isHub: true
      },
      {
        id: "hanada-channel",
        name: "花田町側の生活水路",
        coords: [34.84011, 134.73564],
        level: "平常",
        rain: "雨前は安定（観測連携前）",
        note: "市川の水を農業・生活に使う水路。町の中を細く張り巡らすネットワークの一端。",
        photo: null,
        mapUrl: null
      },
      {
        id: "saito-point",
        name: "飾東町側の分岐",
        coords: [34.83948, 134.73737],
        level: "注意",
        rain: "雨天時に増勢しやすい（想定）",
        note: "増水の差が出やすい候補地点。現地で流れ・護岸・幅を記録する。",
        photo: null,
        mapUrl: null
      }
    ];

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: true
    }).setView(center, 16);

    L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">国土地理院</a>'
    }).addTo(map);

    const waterwayCoords = [
      [34.84045, 134.73487],
      [34.84018, 134.73542],
      [34.83995, 134.73617],
      [34.83963, 134.73697],
      [34.83925, 134.73784]
    ];

    L.polyline(waterwayCoords, {
      color: "#3d6b5a",
      weight: 4,
      opacity: 0.88,
      lineCap: "round",
      lineJoin: "round"
    }).addTo(map);

    L.polyline(
      [
        [34.84138, 134.73404],
        [34.84103, 134.73442],
        [34.84071, 134.7348]
      ],
      {
        color: "#3d6b5a",
        weight: 2,
        opacity: 0.45,
        dashArray: "6, 10"
      }
    ).addTo(map);

    L.polyline(
      [
        [34.8402, 134.7359],
        center,
        [34.8392, 134.7368]
      ],
      {
        color: "#8a6b3d",
        weight: 2,
        opacity: 0.7,
        dashArray: "4, 8"
      }
    ).addTo(map);

    function makeIcon(isHub) {
      return L.divIcon({
        className: "suiro-marker" + (isHub ? " suiro-marker--hub" : ""),
        html: '<span class="suiro-marker__dot"></span>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    const detailEl = document.getElementById("detail");
    const detailName = document.getElementById("detail-name");
    const detailLevel = document.getElementById("detail-level");
    const detailNote = document.getElementById("detail-note");
    const detailRain = document.getElementById("detail-rain");
    const detailPhoto = document.getElementById("detail-photo");
    const detailPhotoPlaceholder = document.getElementById("detail-photo-placeholder");
    const detailMapLink = document.getElementById("detail-map-link");
    const statusPulse = document.getElementById("status-pulse");
    const statusValue = document.getElementById("status-value");

    let activeMarkerEl = null;

    function setGlobalStatus(level) {
      const key = levelKey[level] || "warn";
      statusPulse.dataset.level = key;
      statusValue.textContent = level;
    }

    function openDetail(spot, markerEl) {
      if (activeMarkerEl) {
        activeMarkerEl.classList.remove("is-active");
      }
      if (markerEl) {
        markerEl.classList.add("is-active");
        activeMarkerEl = markerEl;
      }

      detailName.textContent = spot.name;
      detailLevel.textContent = "水位 · " + spot.level;
      detailLevel.dataset.level = levelKey[spot.level] || "warn";
      detailNote.textContent = spot.note;
      detailRain.textContent = spot.rain;

      if (spot.photo) {
        detailPhoto.src = spot.photo;
        detailPhoto.alt = spot.name;
        detailPhoto.classList.remove("is-hidden");
        detailPhotoPlaceholder.hidden = true;
      } else {
        detailPhoto.removeAttribute("src");
        detailPhoto.classList.add("is-hidden");
        detailPhotoPlaceholder.hidden = false;
      }

      if (spot.mapUrl) {
        detailMapLink.href = spot.mapUrl;
        detailMapLink.hidden = false;
      } else {
        detailMapLink.hidden = true;
      }

      detailEl.classList.add("is-open");
      detailEl.setAttribute("aria-hidden", "false");
      setGlobalStatus(spot.level);
    }

    function closeDetail() {
      detailEl.classList.remove("is-open");
      detailEl.setAttribute("aria-hidden", "true");
      if (activeMarkerEl) {
        activeMarkerEl.classList.remove("is-active");
        activeMarkerEl = null;
      }
    }

    document.getElementById("detail-close").addEventListener("click", closeDetail);

    const markers = [];

    points.forEach(function (spot) {
      const marker = L.marker(spot.coords, {
        icon: makeIcon(spot.isHub),
        title: spot.name
      }).addTo(map);

      marker.on("click", function () {
        const el = marker.getElement();
        openDetail(spot, el);
      });

      markers.push({ spot: spot, marker: marker });
    });

    map.on("click", function () {
      closeDetail();
    });

    setGlobalStatus("やや増水");
  </script>
</body>
</html>
