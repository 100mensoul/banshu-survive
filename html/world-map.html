<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>世界地図｜播州サバイブ</title>
  <link rel="stylesheet" href="../css/world-map.css?v=38">
</head>
<body class="world-map-page">
  <div class="world-map-page">
    <div id="world-map-app">
      <div class="world-map-title">
        <span class="world-map-title__main">播州サバイブ</span>
        <small>世界地図 · 閲覧</small>
      </div>
      <a class="world-map-home-link" href="../index.html">トップへ</a>
      <div class="world-map-preset-bar">
        <button type="button" class="world-map-preset-nav" id="world-map-preset-prev" aria-label="前のマップ">‹</button>
        <span class="world-map-preset-nav-label" id="world-map-preset-nav-label"></span>
        <button type="button" class="world-map-preset-nav" id="world-map-preset-next" aria-label="次のマップ">›</button>
      </div>
      <div class="world-map-view-toggle world-map-view-toggle--readonly">
        <button type="button" data-view="plan">平面</button>
        <button type="button" data-view="3d" class="on">立体</button>
      </div>

      <div class="world-map-panel" id="world-map-panel"></div>
      <div class="world-map-scale-legend" id="world-map-scale-legend">
        <div class="world-map-scale-legend__title">縮尺の目安（感覚・厳密な数値ではない）</div>
        <div class="world-map-scale-legend__preset" id="world-map-preset-hint">姫路エリア</div>
        <div class="world-map-scale-legend__row">
          <span class="world-map-scale-grid" aria-hidden="true"></span>
          <span id="world-map-grid-hint">格子1マス ≈ 数百m・町の塊の感覚</span>
        </div>
        <div class="world-map-scale-legend__refs">
          <div class="world-map-scale-ref">
            <span class="world-map-ref-person" id="world-map-ref-person" aria-hidden="true"></span>
            <span>人</span>
          </div>
          <div class="world-map-scale-ref">
            <span class="world-map-ref-car" id="world-map-ref-car" aria-hidden="true"></span>
            <span>車</span>
          </div>
        </div>
        <div class="world-map-scale-legend__mapnote">地図上の小さな人・車も同じ比率です</div>
        <div class="world-map-scale-legend__bands">
          <span class="band" style="background:#8a9e6e">平地</span>
          <span class="band" style="background:#9a8a5c">低い丘</span>
          <span class="band" style="background:#a67a45">播磨の山</span>
          <span class="band" style="background:#c9a86a">高め</span>
        </div>
        <div class="world-map-scale-legend__peak" id="world-map-peak-hint">地形データを読み込むと表示されます</div>
      </div>

      <div class="world-map-shirasagi-avatar" id="world-map-shirasagi-wrap" aria-hidden="true">
        <img
          class="world-map-shirasagi"
          id="world-map-shirasagi"
          src="../images/world-map-shirasagi-fly.png?v=2"
          alt="白鷺"
        >
      </div>

      <div class="world-map-controls">
        <div class="world-map-dpad">
          <button type="button" class="up" data-dir="up" title="前へ (↑)">▲</button>
          <button type="button" class="left" data-dir="left" title="左へ (←)">◀</button>
          <div class="center"></div>
          <button type="button" class="right" data-dir="right" title="右へ (→)">▶</button>
          <button type="button" class="down" data-dir="down" title="後へ (↓)">▼</button>
        </div>
        <div class="world-map-cam-row">
          <button type="button" data-cam="rotate-left" title="左回転 (Q)">↶ <small>Q</small></button>
          <button type="button" data-cam="rotate-right" title="右回転 (E)">↷ <small>E</small></button>
          <span class="world-map-cam-sep" aria-hidden="true"></span>
          <button type="button" data-cam="altitude-up" title="高度を上げる (W)">▲ <small>W</small></button>
          <button type="button" data-cam="altitude-down" title="高度を下げる (S)">▼ <small>S</small></button>
          <span class="world-map-cam-sep" aria-hidden="true"></span>
          <button type="button" data-cam="zoom-in" title="寄る (+)">＋</button>
          <button type="button" data-cam="zoom-out" title="引く (-)">−</button>
        </div>
      </div>

      <div class="world-map-minimap" id="world-map-minimap" hidden>
        <button type="button" class="world-map-minimap__frame" id="world-map-minimap-open" aria-label="俯瞰マップを拡大">
          <canvas id="world-map-minimap-canvas" width="148" height="148"></canvas>
          <span class="world-map-minimap-dot" id="world-map-minimap-dot" aria-hidden="true"></span>
        </button>
        <span class="world-map-minimap__label">俯瞰</span>
      </div>

      <div class="world-map-minimap-modal" id="world-map-minimap-modal" hidden>
        <div class="world-map-minimap-modal__backdrop" id="world-map-minimap-backdrop"></div>
        <div class="world-map-minimap-modal__panel" role="dialog" aria-label="俯瞰マップ">
          <div class="world-map-minimap-modal__head">
            <strong>俯瞰マップ</strong>
            <span class="world-map-minimap-modal__hint">赤い点＝いまの視点</span>
            <button type="button" class="world-map-minimap-modal__close" id="world-map-minimap-close">閉じる</button>
          </div>
          <div class="world-map-minimap-modal__frame">
            <canvas id="world-map-minimap-modal-canvas" width="480" height="480"></canvas>
            <span class="world-map-minimap-dot world-map-minimap-dot--lg" id="world-map-minimap-modal-dot" aria-hidden="true"></span>
          </div>
        </div>
      </div>

      <div class="world-map-loading" id="world-map-loading">大地をひらいています…</div>
    </div>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
    }
  }
  </script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { initWorldMapEditor } from '../js/world-map-editor.js?v=45';

    const supabase = createClient(window.__SB_URL, window.__SB_ANON_KEY);

    initWorldMapEditor({
      supabase,
      readOnly: true,
      defaultPreset: 'hime-memory',
    });
  </script>
</body>
</html>
