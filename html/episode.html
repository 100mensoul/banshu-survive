<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エピソード｜播州サバイブ</title>
  <style>
body {
  background-color: #e6f0ec;
  margin: 0;
  font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
}

.container {
  max-width: 700px;
  margin: 2rem auto;
  background: #fff;
  padding: 1.5rem;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

h1 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 0.3rem;
  font-weight: bold;
}
.sub-title {
  text-align: center;
  color: #7b7b7b;
  font-size: 1.2rem;
  margin-bottom: 0.5rem;
}
.date {
  text-align: center;
  color: #aaa;
  font-size: 0.9rem;
  margin-bottom: 1rem;
}
p {
  margin-bottom: 1rem;
  line-height: 1.8;
}
strong {
  font-weight: bold;
  color: #4a7c59;
}
img {
  width: 100%;
  margin: 1rem 0;
  border-radius: 0;
}
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 1rem 0;
  gap: 0.5rem;
}
.nav a {
  background: #f7d85c;
  color: #333;
  text-decoration: none;
  padding: 0.4rem 1rem;
  border-radius: 4px;
  font-size: 0.9rem;
}
@media (max-width: 768px) {
  .container {
    width: 75%;
    padding: 1.2rem;
  }
  h1 {
    font-size: 1.5rem;
  }
  .nav a {
    font-size: 0.6rem;
    padding: 0.3rem 0.8rem;
  }
}
.episode-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.35rem;
  margin: 0 0 0.75rem;
  min-height: 2.35rem;
}
.episode-top-bar__left {
  flex: 1;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  min-width: 0;
}
.episode-top-bar__left a {
  display: inline-block;
  background: #d4e5d9;
  color: #333;
  text-decoration: none;
  padding: 0.4rem 1rem;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: bold;
}
.episode-top-bar__center {
  flex: 0 1 auto;
  text-align: center;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: #4a6b4a;
  font-weight: 700;
  line-height: 1.2;
  max-width: 50%;
}
.episode-top-bar__center:empty {
  display: none;
}
.episode-top-bar__right {
  flex: 1;
  min-width: 0;
}
.episode-md { line-height: 1.8; }
.episode-md p { margin-bottom: 1rem; }
.episode-md img { width: 100%; margin: 1rem 0; border-radius: 0; }
.episode-md strong { font-weight: bold; color: #4a7c59; }
  </style>
</head>
<body>
  <div class="container">
    <div class="episode-top-bar">
      <div class="episode-top-bar__left">
        <a href="../index.html">← トップへ戻る</a>
      </div>
      <div class="episode-top-bar__center" id="episode-season-slot"></div>
      <div class="episode-top-bar__right" aria-hidden="true"></div>
    </div>

    <div class="nav" id="episode-series-nav-top"></div>

    <div id="episode-content">
      <h1>エピソード</h1>
      <p>トップの「エピソード」から話を選ぶと、このページに <code>?slug=</code> が付いて開きます。</p>
      <p>管理画面だけで公開まで完結させる場合、<strong>新規エピソード用に HTML を追加する必要はありません</strong>（同一の <code>episode.html</code> を使い回します）。</p>
    </div>

    <div class="nav" id="episode-series-nav-bottom"></div>
  </div>
  <script src="../js/supabase-public-config.js"></script>
  <script type="module" src="../js/episode-public.js"></script>
</body>
</html>
