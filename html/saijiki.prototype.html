<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歳時記（水の流れプロトタイプ）｜播州サバイブ</title>
  <meta name="description" content="播州サバイブの出来事を、水の流れのように辿る歳時記プロトタイプ。" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/saijiki.prototype.css?v=3" />
</head>
<body class="saijiki-proto">

  <div class="saijiki-proto-bg" aria-hidden="true">
    <video
      class="saijiki-proto-bg-video"
      muted
      loop
      playsinline
      preload="none"
      poster="../videos/suiro-flow-poster.jpg"
    >
      <source src="../videos/suiro-flow-loop.mp4" type="video/mp4" />
    </video>
    <div class="saijiki-proto-bg-veil"></div>
  </div>

  <header class="saijiki-header">
    <div class="saijiki-header-inner">
      <h1 class="saijiki-title">歳時記</h1>
      <nav class="saijiki-nav" aria-label="サブナビ">
        <a href="../index.html">トップ</a>
        <a href="saijiki.html">本番版</a>
      </nav>
    </div>
  </header>

  <main class="saijiki-main">
    <div id="saijiki-root">
      <p class="saijiki-loading">読み込み中…</p>
    </div>
  </main>

  <footer class="saijiki-footer">
    <p>播州サバイブ 〜姫の路〜</p>
  </footer>

  <div id="saijiki-modal" class="saijiki-modal" hidden>
    <div class="saijiki-modal-backdrop" id="saijiki-modal-backdrop"></div>
    <div
      class="saijiki-modal-box"
      id="saijiki-modal-box"
      role="dialog"
      aria-modal="true"
      aria-labelledby="saijiki-modal-title"
      tabindex="-1"
    >
      <button type="button" class="saijiki-modal-close" id="saijiki-modal-close" aria-label="閉じる">×</button>
      <div id="saijiki-modal-body"></div>
    </div>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module" src="../js/saijiki-public.prototype.js?v=3"></script>

</html>
