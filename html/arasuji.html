<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あらすじ｜播州サバイブ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/arasuji.css?v=3">
  <!-- 先に黒を確実に被せる（CSS読込前の一瞬の白抜け対策。opacity は触らない＝フェードが効く） -->
  <style>
    #arasuji-enter-overlay.is-active {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="arasuji-enter-overlay" class="arasuji-enter-overlay"></div>
<script>
(function () {
  var el = document.getElementById('arasuji-enter-overlay');
  if (!el) return;
  var params = new URLSearchParams(window.location.search);
  var fromUrl = params.get('reveal') === '1';
  try {
    if (fromUrl) {
      history.replaceState(null, '', window.location.pathname + window.location.hash);
    }
  } catch (err) {}
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fromStorage = false;
  try {
    fromStorage = sessionStorage.getItem('banshuArasujiEnter') === '1';
    sessionStorage.removeItem('banshuArasujiEnter');
  } catch (err) {}
  var show = (fromUrl || fromStorage) && !reduceMotion;
  if (show) {
    document.documentElement.style.background = '#000';
    el.classList.add('is-active');
  } else {
    el.parentNode.removeChild(el);
  }
})();
</script>

  <!-- 1. ヒーロー画像 -->
  <div class="hero-image">
    <img src="../images/shikkui-wall.png" alt="播州サバイブ メインビジュアル">
  </div>

  <!-- 2. タイトル -->
  <h1 class="page-title">あらすじ</h1>

  <!-- 3. メニューバー（仮で最低限）-->
  <nav class="menu-bar">
    <a href="../index.html">トップ</a>
    <a href="chart.html">登場人物</a>
    <a href="map.html">地図</a>
    <a href="diary.html">姫ゴト日記</a>
  </nav>

  <!-- 4. サブタイトル -->
  <h2 class="subtitle">この物語が始まる場所</h2>

  <!-- 5. キャッチコピー -->
  <p class="catchcopy">「すべての“今”が、かつての“物語”だった。」</p>

  <!-- 6. 本文 -->
  <section class="main-text">
    <p>
      播州の地に生きる人々の声をすくい上げるようにして生まれたこの物語。
      それはフィクションでありながら、現実よりも真実に近い。
    </p>
    <p>
      語り手は外様（とざま）である「平尾」。<br>
      主人公は不思議な魅力を放つ「R」。<br>
      町おこしという名の再構築が進むなか、彼女たちの日々は記録され、
      いずれ「歴史」となるかもしれない。
    </p>
    <p>
      あなたが今、目にするすべての風景に、物語の種が眠っている。
    </p>
  </section>

<script>
(function () {
  var overlay = document.getElementById('arasuji-enter-overlay');
  if (!overlay || !overlay.classList.contains('is-active')) return;
  var done = false;
  function cleanup() {
    if (done) return;
    done = true;
    document.documentElement.style.background = '';
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
  function startFade() {
    void overlay.offsetHeight;
    overlay.classList.add('is-revealed');
    overlay.addEventListener('transitionend', function onEnd(ev) {
      if (ev.propertyName !== 'opacity') return;
      overlay.removeEventListener('transitionend', onEnd);
      cleanup();
    });
    window.setTimeout(cleanup, 2600);
  }
  window.setTimeout(startFade, 80);
})();
</script>

</body>
</html>
