<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ひめじん管理｜播州サバイブ</title>
  <style>
    body { margin: 0; padding: 16px; background: #f0f2f0; font-family: system-ui, sans-serif; }
    .panel { background: #fff; border: 1px solid #d9ddd9; border-radius: 10px; padding: 12px; }
    .layout { display: grid; gap: 12px; max-width: 1240px; margin: 0 auto; }
    @media (min-width: 960px) { .layout { grid-template-columns: 320px 1fr; } }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .ok, .err { padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .ok { border: 1px solid #4a7c59; background: #e8f5e9; }
    .err { border: 1px solid #a44; background: #ffe8e8; }
    ul { list-style: none; padding: 0; margin: 0; max-height: 70vh; overflow: auto; }
    li { border: 1px solid #ddd; border-radius: 8px; margin: 0 0 8px; padding: 8px; cursor: pointer; }
    li.active { border-color: #333; background: #fff7ad; }
    label { display: block; font-weight: 600; margin-top: 10px; font-size: 13px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; }
    textarea { min-height: 160px; }
    button { padding: 8px 12px; cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .portrait-box {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #d9ddd9;
      border-radius: 8px;
      background: #fafbfa;
    }
    .portrait-preview {
      width: 160px;
      height: 160px;
      border: 1px dashed #bbb;
      border-radius: 8px;
      background: #eef1ee;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .portrait-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .portrait-preview__placeholder {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #888;
    }
    .portrait-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .portrait-hint {
      font-weight: 400;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <h1>ひめじん管理</h1>
  <div class="toolbar">
    <a href="../html/himejin.html">公開ページ</a>
    <span>·</span>
    <a href="news-editor.html">高札場管理</a>
    <span>·</span>
    <a href="tribes-editor.html">種族説明管理</a>
    <span>·</span>
    <a href="clan-editor.html">姫路クラン管理</a>
    <span>·</span>
    <a href="cast-editor.html">相関図管理</a>
    <span>·</span>
    <a href="chart-layout-editor.html">レイアウト編集</a>
    <span>·</span>
    <a href="world-map-editor.html">世界地図</a>
  </div>
  <div id="msg" hidden></div>
  <div class="panel" id="auth-panel">
    <strong>ログイン</strong>
    <label>メール<input id="email" type="email" autocomplete="username"></label>
    <label>パスワード<input id="password" type="password" autocomplete="current-password"></label>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button type="button" id="btn-signin">ログイン</button>
      <button type="button" id="btn-signout">ログアウト</button>
    </div>
  </div>

  <div id="app" class="layout" hidden>
    <div class="panel">
      <button type="button" id="btn-new" style="width:100%;">＋ 新規ひめじん</button>
      <ul id="rows-list"></ul>
    </div>
    <div class="panel">
      <form id="form">
        <input id="row-id" type="hidden">
        <label>slug（英数字・ハイフン）<input id="slug" required></label>
        <label>名前<input id="name" required></label>
        <label>種族コード（<code>tribe_descriptions.code</code> と一致させる）
          <input id="tribe_code" list="tribe-code-list" placeholder="banshujin / nbt / himejin / unknown" required>
        </label>
        <datalist id="tribe-code-list">
          <option value="banshujin"></option>
          <option value="nbt"></option>
          <option value="himejin"></option>
          <option value="unknown"></option>
        </datalist>
        <label>種族ラベル（表示文字）<input id="tribe_label" required></label>
        <label>姫路クラン（任意・1人1つ）
          <select id="clan_code"><option value="">（なし）</option></select>
        </label>
        <label>タグライン<input id="tagline"></label>
        <label>紹介文<textarea id="intro"></textarea></label>
        <div class="portrait-box">
          <label>肖像写真</label>
          <div class="portrait-preview" id="portrait-preview" aria-live="polite">
            <span class="portrait-preview__placeholder">PHOTO</span>
          </div>
          <div class="portrait-actions">
            <input type="file" id="portrait-file" accept="image/*" hidden>
            <button type="button" id="btn-portrait-upload">画像をアップロード</button>
          </div>
          <p class="portrait-hint">
            保存済みの人物のみアップロードできます（先に「保存」で登録）。<br>
            Storage バケット <code>himejin-portraits</code> が未作成の場合は
            <code>admin/sql/himejin-portraits-storage.sql</code> を Supabase で実行してください。
          </p>
        </div>
        <label>写真URL<input id="photo_url" type="url" placeholder="https://..."></label>
        <label>並び順（小さいほど上）<input id="sort_order" type="number" min="0" step="1" value="100"></label>
        <label>公開状態
          <select id="status">
            <option value="draft">下書き</option>
            <option value="published">公開</option>
          </select>
        </label>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <button type="submit">保存</button>
          <button type="button" id="btn-delete">削除</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { resizeImageForUpload } from '../js/harema-image-resize.js';

    const STORAGE_BUCKET = 'himejin-portraits';
    const supabase = createClient(window.__SB_URL, window.__SB_ANON_KEY);
    const msg = document.getElementById('msg');
    const authPanel = document.getElementById('auth-panel');
    const app = document.getElementById('app');
    const list = document.getElementById('rows-list');
    const portraitPreview = document.getElementById('portrait-preview');
    const btnPortraitUpload = document.getElementById('btn-portrait-upload');
    const portraitFileInput = document.getElementById('portrait-file');
    let portraitUploading = false;

    function showMsg(text, ok) {
      msg.hidden = false;
      msg.className = ok ? 'ok' : 'err';
      msg.textContent = text;
    }

    function portraitStoragePath(profileId) {
      return 'portraits/' + profileId + '/current.webp';
    }

    function updatePhotoPreview(url) {
      const trimmed = String(url || '').trim();
      portraitPreview.innerHTML = '';
      if (!trimmed) {
        const span = document.createElement('span');
        span.className = 'portrait-preview__placeholder';
        span.textContent = 'PHOTO';
        portraitPreview.appendChild(span);
        return;
      }
      const img = document.createElement('img');
      img.alt = '肖像プレビュー';
      img.src = trimmed + (trimmed.includes('?') ? '&' : '?') + 'preview=' + Date.now();
      img.addEventListener('error', () => {
        portraitPreview.innerHTML = '';
        const span = document.createElement('span');
        span.className = 'portrait-preview__placeholder';
        span.textContent = '読込失敗';
        portraitPreview.appendChild(span);
      });
      portraitPreview.appendChild(img);
    }

    function setPortraitUploadBusy(busy) {
      portraitUploading = busy;
      btnPortraitUpload.disabled = busy;
      btnPortraitUpload.textContent = busy ? 'アップロード中…' : '画像をアップロード';
    }

    async function convertToWebp(file) {
      if (file.type === 'image/webp') {
        return new File([file], 'current.webp', { type: 'image/webp', lastModified: Date.now() });
      }
      let bitmap;
      try {
        bitmap = await createImageBitmap(file);
      } catch (_e) {
        return file;
      }
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      canvas.getContext('2d', { alpha: false }).drawImage(bitmap, 0, 0);
      bitmap.close();
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/webp', 0.85));
      if (!blob) return file;
      return new File([blob], 'current.webp', { type: 'image/webp', lastModified: Date.now() });
    }

    async function uploadPortrait(file) {
      const profileId = document.getElementById('row-id').value.trim();
      if (!profileId) {
        showMsg('肖像のアップロード前に、人物を一度「保存」して ID を確定してください', false);
        return;
      }
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        showMsg('アップロードにはログインが必要です', false);
        return;
      }

      setPortraitUploadBusy(true);
      try {
        showMsg('画像を最適化しています…', true);
        let uploadFile = file;
        try {
          uploadFile = await resizeImageForUpload(file, { maxWidth: 1200, maxHeight: 1200, quality: 0.88 });
          uploadFile = await convertToWebp(uploadFile);
        } catch (err) {
          console.warn('portrait resize skipped', err);
          uploadFile = await convertToWebp(file);
        }

        const path = portraitStoragePath(profileId);
        const { error: upErr } = await supabase.storage
          .from(STORAGE_BUCKET)
          .upload(path, uploadFile, { contentType: 'image/webp', upsert: true });
        if (upErr) {
          showMsg('アップロード失敗: ' + upErr.message, false);
          return;
        }

        const { data: pub } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        const versionedUrl = pub.publicUrl + '?v=' + Date.now();
        const generatedAt = new Date().toISOString();
        const { error: dbErr } = await supabase
          .from('himejin_profiles')
          .update({
            photo_url: versionedUrl,
            image_source: 'upload',
            image_generated_at: generatedAt,
            image_prompt: null,
          })
          .eq('id', profileId);
        if (dbErr) {
          showMsg('DB更新失敗: ' + dbErr.message, false);
          return;
        }

        document.getElementById('photo_url').value = versionedUrl;
        updatePhotoPreview(versionedUrl);
        showMsg('肖像をアップロードしました', true);
        await loadList();
        highlightListItem(profileId);
      } finally {
        setPortraitUploadBusy(false);
        portraitFileInput.value = '';
      }
    }
    async function loadClanSelect() {
      const sel = document.getElementById('clan_code');
      const prev = sel.value;
      const { data, error } = await supabase
        .from('clan_descriptions')
        .select('code,title')
        .order('sort_order', { ascending: true })
        .order('code', { ascending: true });
      sel.innerHTML = '<option value="">（なし）</option>';
      if (!error) {
        for (const c of data || []) {
          const opt = document.createElement('option');
          opt.value = c.code;
          opt.textContent = c.title || c.code;
          sel.appendChild(opt);
        }
      }
      if (prev && [...sel.options].some((o) => o.value === prev)) sel.value = prev;
    }

    function fillForm(row) {
      document.getElementById('row-id').value = row.id || '';
      document.getElementById('slug').value = row.slug || '';
      document.getElementById('name').value = row.name || '';
      document.getElementById('tribe_code').value = row.tribe_code || 'unknown';
      document.getElementById('tribe_label').value = row.tribe_label || '未判明';
      const clanSel = document.getElementById('clan_code');
      clanSel.value = row.clan_code && String(row.clan_code).trim() !== '' ? row.clan_code : '';
      document.getElementById('tagline').value = row.tagline || '';
      document.getElementById('intro').value = row.intro || '';
      document.getElementById('photo_url').value = row.photo_url || '';
      document.getElementById('sort_order').value = row.sort_order ?? 100;
      document.getElementById('status').value = row.status || 'draft';
      updatePhotoPreview(row.photo_url || '');
    }
    function clearForm() {
      fillForm({ id: '', slug: '', name: '', tribe_code: 'unknown', tribe_label: '', clan_code: '', tagline: '', intro: '', photo_url: '', sort_order: 100, status: 'draft' });
      list.querySelectorAll('li').forEach((li) => li.classList.remove('active'));
    }
    async function loadList() {
      const { data, error } = await supabase
        .from('himejin_profiles')
        .select('*')
        .order('sort_order', { ascending: true })
        .order('updated_at', { ascending: true });
      if (error) {
        showMsg('一覧取得エラー: ' + error.message, false);
        return;
      }
      list.innerHTML = '';
      for (const row of data || []) {
        const li = document.createElement('li');
        li.dataset.profileId = row.id || '';
        li.innerHTML = '<strong>' + (row.name || '-') + '</strong><br><small>' + (row.slug || '') + ' / ' + (row.status || '') + '</small>';
        li.addEventListener('click', () => {
          list.querySelectorAll('li').forEach((x) => x.classList.remove('active'));
          li.classList.add('active');
          fillForm(row);
        });
        list.appendChild(li);
      }
    }

    function highlightListItem(profileId) {
      list.querySelectorAll('li').forEach((li) => {
        li.classList.toggle('active', li.dataset.profileId === profileId);
      });
    }

    document.getElementById('btn-new').addEventListener('click', clearForm);

    btnPortraitUpload.addEventListener('click', () => {
      if (portraitUploading) return;
      const profileId = document.getElementById('row-id').value.trim();
      if (!profileId) {
        showMsg('肖像のアップロード前に、人物を一度「保存」して ID を確定してください', false);
        return;
      }
      portraitFileInput.click();
    });

    portraitFileInput.addEventListener('change', async (e) => {
      const file = (e.target.files || [])[0];
      if (!file) return;
      if (!file.type || file.type.indexOf('image/') !== 0) {
        showMsg('画像ファイルを選んでください', false);
        e.target.value = '';
        return;
      }
      await uploadPortrait(file);
    });

    document.getElementById('photo_url').addEventListener('input', (e) => {
      updatePhotoPreview(e.target.value);
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('row-id').value;
      const clanVal = document.getElementById('clan_code').value.trim();
      const payload = {
        slug: document.getElementById('slug').value.trim(),
        name: document.getElementById('name').value.trim(),
        tribe_code: document.getElementById('tribe_code').value,
        tribe_label: document.getElementById('tribe_label').value.trim(),
        clan_code: clanVal === '' ? null : clanVal,
        tagline: document.getElementById('tagline').value.trim() || null,
        intro: document.getElementById('intro').value.trim() || null,
        photo_url: document.getElementById('photo_url').value.trim() || null,
        sort_order: parseInt(document.getElementById('sort_order').value || '100', 10),
        status: document.getElementById('status').value,
      };
      if (!payload.slug || !payload.name || !payload.tribe_label) {
        showMsg('slug / 名前 / 種族ラベル は必須です', false);
        return;
      }
      let error;
      let savedRow = null;
      if (id) {
        ({ error } = await supabase.from('himejin_profiles').update(payload).eq('id', id));
        if (!error) {
          const res = await supabase.from('himejin_profiles').select('*').eq('id', id).single();
          savedRow = res.data;
          error = res.error;
        }
      } else {
        const res = await supabase.from('himejin_profiles').insert(payload).select('*').single();
        savedRow = res.data;
        error = res.error;
      }
      if (error) {
        showMsg('保存エラー: ' + error.message, false);
        return;
      }
      showMsg('保存しました', true);
      await loadList();
      if (savedRow) {
        fillForm(savedRow);
        highlightListItem(savedRow.id);
      }
    });

    document.getElementById('btn-delete').addEventListener('click', async () => {
      const id = document.getElementById('row-id').value;
      if (!id) {
        showMsg('削除対象を選択してください', false);
        return;
      }
      if (!confirm('この人物を削除しますか？')) return;
      const { error } = await supabase.from('himejin_profiles').delete().eq('id', id);
      if (error) {
        showMsg('削除エラー: ' + error.message, false);
        return;
      }
      showMsg('削除しました', true);
      clearForm();
      await loadList();
    });

    document.getElementById('btn-signin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg('ログイン失敗: ' + error.message, false);
        return;
      }
      showMsg('ログインしました', true);
    });
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      showMsg('ログアウトしました', true);
    });
    function setUi(session) {
      if (session) {
        authPanel.hidden = true;
        app.hidden = false;
        loadClanSelect().then(() => loadList());
      } else {
        authPanel.hidden = false;
        app.hidden = true;
      }
    }
    supabase.auth.onAuthStateChange((_e, session) => setUi(session));
    const { data: { session } } = await supabase.auth.getSession();
    setUi(session);
  </script>
</body>
</html>
