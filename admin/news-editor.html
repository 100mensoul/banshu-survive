<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高札場ニュース管理｜播州サバイブ</title>
  <style>
    body { margin: 0; padding: 16px; background: #f0f2f0; font-family: system-ui, sans-serif; }
    .panel { background: #fff; border: 1px solid #d9ddd9; border-radius: 10px; padding: 12px; }
    .layout { display: grid; gap: 12px; max-width: 1200px; margin: 0 auto; }
    @media (min-width: 900px) { .layout { grid-template-columns: 280px 1fr; } }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .ok, .err { padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .ok { border: 1px solid #4a7c59; background: #e8f5e9; }
    .err { border: 1px solid #a44; background: #ffe8e8; }
    ul { list-style: none; padding: 0; margin: 0; max-height: 70vh; overflow: auto; }
    li { border: 1px solid #ddd; border-radius: 8px; margin: 0 0 8px; padding: 8px; cursor: pointer; }
    li.active { border-color: #333; background: #fff7ad; }
    label { display: block; font-weight: 600; margin-top: 10px; font-size: 13px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; }
    textarea { min-height: 120px; }
    button { padding: 8px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>高札場ニュース管理</h1>
  <div class="toolbar">
    <a href="../index.html">サイトトップ</a>
    <span>·</span>
    <a href="episodes-editor.html">エピソード管理</a>
    <span>·</span>
    <a href="himejin-editor.html">ひめじん</a>
    <span>·</span>
    <a href="cast-editor.html">相関図</a>
  </div>
  <div id="msg" hidden></div>
  <div class="panel" id="auth-panel">
    <strong>ログイン</strong>
    <label>メール<input id="email" type="email" autocomplete="username"></label>
    <label>パスワード<input id="password" type="password" autocomplete="current-password"></label>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button type="button" id="btn-signin">ログイン</button>
      <button type="button" id="btn-signout">ログアウト</button>
    </div>
  </div>

  <div id="app" class="layout" hidden>
    <div class="panel">
      <button type="button" id="btn-new" style="width:100%;">＋ 新規ニュース</button>
      <ul id="news-list"></ul>
    </div>
    <div class="panel">
      <form id="form">
        <input id="row-id" type="hidden">
        <label>タイトル<input id="title" required></label>
        <label>本文（任意）<textarea id="body"></textarea></label>
        <label>リンクURL（任意）<input id="link_url" type="url" placeholder="https://..."></label>
        <label>日付<input id="happened_on" type="date"></label>
        <label>公開状態
          <select id="status">
            <option value="draft">下書き</option>
            <option value="published">公開</option>
          </select>
        </label>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <button type="submit">保存</button>
          <button type="button" id="btn-delete">削除</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(window.__SB_URL, window.__SB_ANON_KEY);
    const msg = document.getElementById('msg');
    const authPanel = document.getElementById('auth-panel');
    const app = document.getElementById('app');
    const list = document.getElementById('news-list');

    function showMsg(text, ok) {
      msg.hidden = false;
      msg.className = ok ? 'ok' : 'err';
      msg.textContent = text;
    }

    function fillForm(row) {
      document.getElementById('row-id').value = row.id || '';
      document.getElementById('title').value = row.title || '';
      document.getElementById('body').value = row.body || '';
      document.getElementById('link_url').value = row.link_url || '';
      document.getElementById('happened_on').value = row.happened_on || '';
      document.getElementById('status').value = row.status || 'draft';
    }

    function clearForm() {
      fillForm({ id: '', title: '', body: '', link_url: '', happened_on: '', status: 'draft' });
      list.querySelectorAll('li').forEach((li) => li.classList.remove('active'));
    }

    async function loadList() {
      const { data, error } = await supabase
        .from('news_posts')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        showMsg('一覧取得エラー: ' + error.message, false);
        return;
      }
      list.innerHTML = '';
      for (const row of data || []) {
        const li = document.createElement('li');
        li.innerHTML = '<strong>' + (row.title || '無題') + '</strong><br><small>' + (row.status || '') + ' / ' + (row.happened_on || '') + '</small>';
        li.addEventListener('click', () => {
          list.querySelectorAll('li').forEach((x) => x.classList.remove('active'));
          li.classList.add('active');
          fillForm(row);
        });
        list.appendChild(li);
      }
    }

    document.getElementById('btn-new').addEventListener('click', clearForm);

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('row-id').value;
      const payload = {
        title: document.getElementById('title').value.trim(),
        body: document.getElementById('body').value.trim() || null,
        link_url: document.getElementById('link_url').value.trim() || null,
        happened_on: document.getElementById('happened_on').value || null,
        status: document.getElementById('status').value,
      };
      if (!payload.title) {
        showMsg('タイトルは必須です', false);
        return;
      }
      let error;
      if (id) {
        ({ error } = await supabase.from('news_posts').update(payload).eq('id', id));
      } else {
        ({ error } = await supabase.from('news_posts').insert(payload));
      }
      if (error) {
        showMsg('保存エラー: ' + error.message, false);
        return;
      }
      showMsg('保存しました', true);
      clearForm();
      await loadList();
    });

    document.getElementById('btn-delete').addEventListener('click', async () => {
      const id = document.getElementById('row-id').value;
      if (!id) {
        showMsg('削除対象を選択してください', false);
        return;
      }
      if (!confirm('このニュースを削除しますか？')) return;
      const { error } = await supabase.from('news_posts').delete().eq('id', id);
      if (error) {
        showMsg('削除エラー: ' + error.message, false);
        return;
      }
      showMsg('削除しました', true);
      clearForm();
      await loadList();
    });

    document.getElementById('btn-signin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg('ログイン失敗: ' + error.message, false);
        return;
      }
      showMsg('ログインしました', true);
    });

    document.getElementById('btn-signout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      showMsg('ログアウトしました', true);
    });

    function setUi(session) {
      if (session) {
        authPanel.hidden = true;
        app.hidden = false;
        loadList();
      } else {
        authPanel.hidden = false;
        app.hidden = true;
      }
    }

    supabase.auth.onAuthStateChange((_e, session) => setUi(session));
    const { data: { session } } = await supabase.auth.getSession();
    setUi(session);
  </script>
</body>
</html>
