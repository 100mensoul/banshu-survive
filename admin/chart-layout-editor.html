<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>相関図レイアウトエディタ｜播州サバイブ</title>
  <link rel="stylesheet" href="../css/chart-layout.css?v=14">
</head>
<body class="chart-layout-auth" id="chart-layout-body">
  <div id="chart-layout-auth-wrap">
    <h1>相関図レイアウトエディタ</h1>
    <div class="toolbar">
      <a href="../html/chart.html">公開ページ（相関図）</a>
      <span>·</span>
      <a href="cast-editor.html">登場人物管理</a>
      <span>·</span>
      <a href="himejin-editor.html">ひめじん管理</a>
      <span>·</span>
      <a href="world-map-editor.html">世界地図</a>
    </div>
    <p style="font-size:13px;color:#555;max-width:1100px;">
      <strong>初回のみ：</strong>Supabase の SQL Editor に
      <code>admin/sql/chart-layout.sql</code> の<strong>中身（SQL 文）</strong>を貼って実行してください。
      ※この HTML ページ自体を SQL Editor に貼らないでください。
      キャラをドラッグして配置し、線を引いて関係を編集。「保存」で公開ページに反映。家系は 💑 夫婦 → 🌿 親子（長女・次女など）の順。
    </p>
    <div id="chart-layout-msg" hidden></div>
    <div class="panel" id="chart-layout-auth-panel">
      <strong>ログイン</strong>
      <p style="font-size:13px;margin:8px 0 0;">編集には Supabase Auth ログインが必要です。</p>
      <label>メール<input id="chart-layout-email" type="email" autocomplete="username"></label>
      <label>パスワード<input id="chart-layout-password" type="password" autocomplete="current-password"></label>
      <div style="margin-top:8px;display:flex;gap:8px;">
        <button type="button" id="chart-layout-signin">ログイン</button>
        <button type="button" id="chart-layout-signout">ログアウト</button>
      </div>
    </div>
  </div>

  <div id="chart-layout-editor-wrap" hidden>
    <div class="chart-layout-editor-shell">
      <div id="chart-layout-root"></div>
    </div>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import {
      initChartLayoutEditor,
      fetchChartLayout,
      loadCastAndHimejinForLayout,
    } from '../js/chart-layout-editor.js?v=19';

    const supabase = createClient(window.__SB_URL, window.__SB_ANON_KEY);
    const msg = document.getElementById('chart-layout-msg');
    const authWrap = document.getElementById('chart-layout-auth-wrap');
    const editorWrap = document.getElementById('chart-layout-editor-wrap');
    let editorApi = null;
    let editorStarted = false;

    function showMsg(text, ok) {
      msg.hidden = false;
      msg.className = ok ? 'ok' : 'err';
      msg.textContent = text;
    }

    async function startEditor() {
      if (editorStarted) return;
      editorStarted = true;
      document.body.className = 'chart-layout-page';

      const { groups, peopleMap } = await loadCastAndHimejinForLayout(supabase, false);
      const remote = await fetchChartLayout(supabase, false);

      editorApi = initChartLayoutEditor({
        supabase,
        readOnly: false,
        container: 'chart-layout-root',
        groups,
        peopleMap,
        initialCanvas: remote?.canvas || null,
        onStatus: function (text) {
          showMsg(text, true);
        },
      });

      editorApi.mergeInitialLoad(remote);
    }

    function setUi(session) {
      if (session) {
        authWrap.hidden = true;
        editorWrap.hidden = false;
        startEditor();
      } else {
        authWrap.hidden = false;
        editorWrap.hidden = true;
        document.body.className = 'chart-layout-auth';
        editorStarted = false;
        editorApi = null;
      }
    }

    document.getElementById('chart-layout-signin').addEventListener('click', async function () {
      const email = document.getElementById('chart-layout-email').value.trim();
      const password = document.getElementById('chart-layout-password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) showMsg('ログイン失敗: ' + error.message, false);
      else showMsg('ログインしました', true);
    });

    document.getElementById('chart-layout-signout').addEventListener('click', async function () {
      await supabase.auth.signOut();
      showMsg('ログアウトしました', true);
    });

    supabase.auth.onAuthStateChange(function (_e, session) {
      setUi(session);
    });

    const { data: { session } } = await supabase.auth.getSession();
    setUi(session);
  </script>
</body>
</html>
