<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>種族説明管理｜播州サバイブ</title>
  <style>
    body { margin: 0; padding: 16px; background: #f0f2f0; font-family: system-ui, sans-serif; }
    .panel { background: #fff; border: 1px solid #d9ddd9; border-radius: 10px; padding: 12px; max-width: 960px; margin: 0 auto 12px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 0 auto 12px; max-width: 960px; }
    .ok, .err { padding: 10px; border-radius: 8px; max-width: 960px; margin: 0 auto 10px; }
    .ok { border: 1px solid #4a7c59; background: #e8f5e9; }
    .err { border: 1px solid #a44; background: #ffe8e8; }
    label { display: block; font-weight: 600; margin-top: 10px; font-size: 13px; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; }
    textarea { min-height: 100px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    button { padding: 8px 12px; cursor: pointer; margin-right: 6px; margin-top: 6px; }
    code { font-size: 0.85em; }
  </style>
</head>
<body>
  <h1 style="max-width:960px;margin:0 auto 8px;">種族説明管理</h1>
  <div class="toolbar">
    <a href="../html/himejin-glossary.html">公開・辞典ページ</a>
    <span>·</span>
    <a href="clan-editor.html">姫路クラン管理</a>
    <span>·</span>
    <a href="cast-editor.html">相関図管理</a>
    <span>·</span>
    <a href="himejin-editor.html">ひめじん管理</a>
  </div>
  <div id="msg" hidden></div>

  <div class="panel" id="auth-panel">
    <strong>ログイン</strong>
    <label>メール<input id="email" type="email" autocomplete="username"></label>
    <label>パスワード<input id="password" type="password" autocomplete="current-password"></label>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button type="button" id="btn-signin">ログイン</button>
      <button type="button" id="btn-signout">ログアウト</button>
    </div>
  </div>

  <div id="app" class="panel" hidden>
    <p style="font-size:0.82rem;color:#555;margin:0 0 8px;">
      ひめじんファイル上部に出すのは <code>banshujin</code> / <code>nbt</code> / <code>himejin</code> の3枠のみ。それ以外の種族は<strong>辞典ページ</strong>に一覧されます。
    </p>
    <button type="button" id="btn-add">＋ 種族を追加</button>
    <form id="form"></form>
    <button id="btn-save-all" type="button">すべて保存（一括 upsert）</button>
  </div>

  <script src="../js/supabase-public-config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient(window.__SB_URL, window.__SB_ANON_KEY);
    const msg = document.getElementById('msg');
    const authPanel = document.getElementById('auth-panel');
    const app = document.getElementById('app');
    const form = document.getElementById('form');

    function showMsg(text, ok) {
      msg.hidden = false;
      msg.className = ok ? 'ok' : 'err';
      msg.textContent = text;
    }

    function cardHtml(row) {
      const codeVal = escAttr(row.code || '');
      const titleVal = escAttr(row.title || '');
      const descVal = escTextarea(row.description || '');
      const sortVal = row.sort_order != null ? String(row.sort_order) : '100';
      return (
        '<div class="card" data-card>' +
        '<label>code ' +
        '<input data-k="code" value="' + codeVal + '" required pattern="[a-z0-9][a-z0-9-]*" title="英小文字・数字・ハイフン">' +
        '</label>' +
        '<label>並び順<input data-k="sort_order" type="number" step="1" value="' + sortVal + '"></label>' +
        '<label>見出し<input data-k="title" value="' + titleVal + '" required></label>' +
        '<label>本文<textarea data-k="description" required>' + descVal + '</textarea></label>' +
        '</div>'
      );
    }

    function escAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/"/g, '&quot;');
    }

    function escTextarea(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }

    function renderRows(rows) {
      form.innerHTML = '';
      const sorted = [...(rows || [])].sort((a, b) => {
        const sa = a.sort_order != null ? a.sort_order : 999;
        const sb = b.sort_order != null ? b.sort_order : 999;
        if (sa !== sb) return sa - sb;
        return String(a.code || '').localeCompare(String(b.code || ''));
      });
      for (const row of sorted) {
        const wrap = document.createElement('div');
        wrap.innerHTML = cardHtml(row);
        form.appendChild(wrap.firstElementChild);
      }
    }

    async function loadRows() {
      const { data, error } = await supabase
        .from('tribe_descriptions')
        .select('code,title,description,sort_order')
        .order('sort_order', { ascending: true })
        .order('code', { ascending: true });
      if (error) {
        showMsg('取得エラー: ' + error.message, false);
        return;
      }
      renderRows(data || []);
    }

    document.getElementById('btn-add').addEventListener('click', () => {
      const div = document.createElement('div');
      div.innerHTML = cardHtml({ code: '', title: '', description: '', sort_order: 200 });
      form.appendChild(div.firstElementChild);
    });

    document.getElementById('btn-save-all').addEventListener('click', async () => {
      const payload = [];
      for (const card of form.querySelectorAll('[data-card]')) {
        payload.push({
          code: card.querySelector('[data-k="code"]').value.trim(),
          title: card.querySelector('[data-k="title"]').value.trim(),
          description: card.querySelector('[data-k="description"]').value.trim(),
          sort_order: parseInt(card.querySelector('[data-k="sort_order"]').value || '100', 10),
        });
      }
      if (payload.some((x) => !x.code || !x.title || !x.description)) {
        showMsg('各カードの code / 見出し / 本文 を埋めてください', false);
        return;
      }
      const codes = payload.map((p) => p.code);
      if (new Set(codes).size !== codes.length) {
        showMsg('code が重複しています', false);
        return;
      }
      const { error } = await supabase
        .from('tribe_descriptions')
        .upsert(payload, { onConflict: 'code' });
      if (error) {
        showMsg('保存エラー: ' + error.message, false);
        return;
      }
      showMsg('保存しました', true);
      await loadRows();
    });

    document.getElementById('btn-signin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg('ログイン失敗: ' + error.message, false);
        return;
      }
      showMsg('ログインしました', true);
    });
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      showMsg('ログアウトしました', true);
    });

    function setUi(session) {
      if (session) {
        authPanel.hidden = true;
        app.hidden = false;
        loadRows();
      } else {
        authPanel.hidden = false;
        app.hidden = true;
      }
    }

    supabase.auth.onAuthStateChange((_e, session) => setUi(session));
    const { data: { session } } = await supabase.auth.getSession();
    setUi(session);
  </script>
</body>
</html>
